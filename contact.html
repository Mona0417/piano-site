    <style>
        body {
            background: linear-gradient(rgba(22, 32, 45, 0.98), rgba(12, 18, 26, 1));
            background-color: #0c121a; 
            color: #b0bac5;
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav { margin-top: 45px; margin-bottom: 90px; }
        nav a { color: #6d7b8d; text-decoration: none; margin: 0 25px; font-size: 0.8rem; letter-spacing: 4px; transition: 0.4s; text-transform: uppercase; }
        nav a:hover { color: #d1b48c; }

        .contact-container {
            text-align: center;
            max-width: 700px;
            animation: fadeIn 2s ease forwards;
        }

        h2 {
            font-family: 'Playball', cursive;
            font-size: 3rem;
            color: #d1b48c;
            margin-bottom: 50px;
            font-weight: normal;
        }

        .label {
            letter-spacing: 4px; 
            font-size: 0.7rem; 
            color: #5a6675; 
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .email-link {
            font-size: 1.4rem;
            color: #e1e8ed;
            text-decoration: none;
            letter-spacing: 2px;
            transition: 0.3s;
            display: block;
            margin-bottom: 80px;
        }

        .email-link:hover { color: #d1b48c; }

        .link-group {
            margin-bottom: 60px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 35px;
            flex-wrap: wrap;
        }

        .social-links a {
            color: #8491a1;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.4s;
            border-bottom: 1px solid transparent;
            padding-bottom: 3px;
        }

        .social-links a:hover {
            color: #d1b48c;
            border-bottom: 1px solid rgba(209, 180, 140, 0.4);
        }

        footer {
            margin-top: auto;
            padding: 40px;
            color: #4a5461;
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
